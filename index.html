<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Visualization</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            transition: background-color 0.3s;
        }
        .popup {
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s;
        }
        .sidebar {
            transition: width 0.3s;
        }
        .legend {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
        }
        .route-line {
            color: #ffcc00;
            stroke-width: 4;
            stroke-linecap: round;
        }
    </style>
</head>
<body>
    <div id="map" style="height: 100vh;"></div>
    <div class="legend">
        <h4>Legend</h4>
        <div><span style="color: blue;">●</span> Beyond ship</div>
        <div><span style="color: orange;">●</span> Matching ships</div>
        <div><span style="color: gray;">●</span> Other stops</div>
    </div>
    <script>
        var map = L.map('map').setView([51.505, -0.09], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Example GeoJSON data
        var geojsonLayer = L.geoJSON(geojsonData, {
            style: function(feature) {
                return { color: feature.properties.color, weight: 4, opacity: 0.7, lineCap: 'round' };
            },
            onEachFeature: function (feature, layer) {
                layer.bindPopup(feature.properties.name);
                layer.on('mouseover', function () { layer.openPopup(); });
                layer.on('mouseout', function () { layer.closePopup(); });
            }
        }).addTo(map);

        // Functionality for filtering ships and toggling routes
    </script>
</body>
</html>
