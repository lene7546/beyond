<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beyond Co-Location Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <style>
    :root {
      --bg: #0f1220;
      --panel: rgba(255,255,255,0.97);
      --text: #1f2430;
      --muted: #667085;
      --border: #d8dbe5;
    }
    html, body { margin:0; height:100%; font-family: Inter, Arial, sans-serif; background: var(--bg); }
    #app { display:grid; grid-template-columns: 390px 1fr; height:100vh; }
    #sidebar { padding:18px; border-right:1px solid var(--border); overflow:auto; background:var(--panel); color:var(--text); box-sizing:border-box; }
    #map { width:100%; height:100%; }
    h1 { margin:0 0 8px; font-size:22px; }
    .sub, .small { color: #667085; line-height:1.45; }
    .sub { font-size:13px; margin:0 0 14px; }
    .small { font-size:12px; }
    label { display:block; font-size:13px; margin:14px 0 6px; font-weight:700; }
    select, button, input[type=checkbox] { font-size:14px; }
    select, button { width:100%; padding:10px 12px; border:1px solid #d8dbe5; border-radius:10px; background:#fff; box-sizing:border-box; }
    button { margin-top:10px; cursor:pointer; font-weight:700; }
    .checkrow { margin-top:12px; display:flex; align-items:flex-start; gap:10px; }
    .checkrow input { margin-top:3px; }
    .card { margin-top:16px; padding:12px; border:1px solid #d8dbe5; border-radius:14px; background:#fff; }
    .card h2 { margin:0 0 10px; font-size:16px; }
    .match-item { padding:10px; border:1px solid #d8dbe5; border-radius:12px; margin-top:10px; background:#fff; cursor:pointer; }
    .match-item:hover { background:#f7f9fc; }
    .match-title { font-weight:800; font-size:14px; }
    .match-meta { margin-top:4px; color:#667085; font-size:12px; }
    .match-link { margin-top:6px; font-size:12px; }
    .match-link a { color:#153b8a; text-decoration:none; }
    .match-link a:hover { text-decoration:underline; }
    .stats { margin-top:14px; font-size:13px; color:#667085; line-height:1.5; }
    .leaflet-popup-content { margin: 12px 14px; line-height:1.45; min-width:240px; }
    .popup-title { font-weight:800; font-size:15px; margin-bottom:6px; }
    .popup-row { margin-top:4px; font-size:13px; }
    @media (max-width: 950px) {
      #app { grid-template-columns:1fr; grid-template-rows:auto 1fr; }
      #sidebar { border-right:0; border-bottom:1px solid #d8dbe5; }
      #map { min-height:65vh; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <h1>Beyond Co-Location Map</h1>
    <p class="sub"><strong>Beyond</strong> stays on the map at all times. Pick a Beyond stop to see which cruises are in the same port that day. Click a route card to highlight that ship's full route.</p>

    <label for="anchorStopFilter">Beyond stop</label>
    <select id="anchorStopFilter"></select>

    <div class="checkrow">
      <input type="checkbox" id="showFullRoutes" checked />
      <label for="showFullRoutes" style="margin:0; font-weight:600;">Show full routes of matching ships</label>
    </div>

    <div class="checkrow">
      <input type="checkbox" id="showNonMatching" />
      <label for="showNonMatching" style="margin:0; font-weight:600;">Show non-matching ships faintly</label>
    </div>

    <button id="resetBtn" type="button">Reset view</button>

    <div class="card">
      <h2>Ships in port with Beyond</h2>
      <div id="selectedStopText" class="small"></div>
      <div id="matchList"></div>
    </div>

    <div class="stats" id="stats"></div>
  </div>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
const ANCHOR_SHIP = "Beyond";
const anchorStops = [{"ship": "Beyond", "route_id": "Celebrity - Beyond", "day_key": "2026-08-09", "display_date": "Aug 09, 2026", "port_name": "Miami", "latitude": 25.7781, "longitude": -80.1794}, {"ship": "Beyond", "route_id": "Celebrity - Beyond", "day_key": "2026-08-10", "display_date": "Aug 10, 2026", "port_name": "Coco Cay", "latitude": 25.8175, "longitude": -77.9326}, {"ship": "Beyond", "route_id": "Celebrity - Beyond", "day_key": "2026-08-12", "display_date": "Aug 12, 2026", "port_name": "Cozumel", "latitude": 20.509, "longitude": -86.9475}, {"ship": "Beyond", "route_id": "Celebrity - Beyond", "day_key": "2026-08-13", "display_date": "Aug 13, 2026", "port_name": "George Town", "latitude": 19.2866, "longitude": -81.3744}, {"ship": "Beyond", "route_id": "Celebrity - Beyond", "day_key": "2026-08-15", "display_date": "Aug 15, 2026", "port_name": "Nassau", "latitude": 25.078, "longitude": -77.338}, {"ship": "Beyond", "route_id": "Celebrity - Beyond", "day_key": "2026-08-16", "display_date": "Aug 16, 2026", "port_name": "Miami", "latitude": 25.7781, "longitude": -80.1794}];

const map = L.map('map', { zoomControl:true, preferCanvas:true }).setView([24.8, -76.8], 5);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let portsData = null;
let routesData = null;
let portsLayer = null;
let routesLayer = null;
let selectedRouteId = null;

const anchorStopFilter = document.getElementById('anchorStopFilter');
const showFullRoutes = document.getElementById('showFullRoutes');
const showNonMatching = document.getElementById('showNonMatching');
const resetBtn = document.getElementById('resetBtn');
const stats = document.getElementById('stats');
const matchList = document.getElementById('matchList');
const selectedStopText = document.getElementById('selectedStopText');

const PALETTE = ['#c0392b','#8e44ad','#2980b9','#16a085','#d35400','#2c3e50','#27ae60','#7f8c8d','#e67e22','#6c5ce7','#00a8ff','#e84393'];
const routeColorMap = new Map();

function colorForRoute(routeId) {
  if (routeId === 'BEYOND_ANCHOR') return '#153b8a';
  if (!routeColorMap.has(routeId)) {
    routeColorMap.set(routeId, PALETTE[routeColorMap.size % PALETTE.length]);
  }
  return routeColorMap.get(routeId);
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function selectedAnchorStop() {
  const idx = Number(anchorStopFilter.value || 0);
  return anchorStops[idx] || anchorStops[0];
}

function samePortDay(props, stop) {
  return props.port_name === stop.port_name && props.day_key === stop.day_key;
}

function matchesStopByRoute(routeId, stop) {
  return portsData.features.some(f => f.properties.route_id === routeId && f.properties.ship !== ANCHOR_SHIP && samePortDay(f.properties, stop));
}

function getMatchingRoutes(stop) {
  const routes = new Map();
  portsData.features.forEach(f => {
    const p = f.properties;
    if (p.ship !== ANCHOR_SHIP && samePortDay(p, stop)) {
      if (!routes.has(p.route_id)) {
        routes.set(p.route_id, {
          route_id: p.route_id,
          ship: p.ship,
          cruise_line: p.cruise_line,
          itinerary_link: p.itinerary_link || ''
        });
      }
    }
  });
  return [...routes.values()].sort((a,b) => String(a.route_id).localeCompare(String(b.route_id)));
}

function routeVisible(props, stop) {
  if (props.ship === ANCHOR_SHIP) return true;
  const matchingRoute = matchesStopByRoute(props.route_id, stop);
  if (matchingRoute && showFullRoutes.checked) return true;
  if (matchingRoute) {
    return (props.from_port === stop.port_name && props.from_day_key === stop.day_key) ||
           (props.to_port === stop.port_name && props.to_day_key === stop.day_key);
  }
  return showNonMatching.checked;
}

function portVisible(props, stop) {
  if (props.ship === ANCHOR_SHIP) return true;
  const matchingRoute = matchesStopByRoute(props.route_id, stop);
  if (matchingRoute && showFullRoutes.checked) return true;
  if (matchingRoute) return samePortDay(props, stop);
  return showNonMatching.checked;
}

function routeStyle(props, stop) {
  if (props.ship === ANCHOR_SHIP) return { color: '#153b8a', weight: 4, opacity: 0.95 };
  const matchingRoute = matchesStopByRoute(props.route_id, stop);
  const baseColor = colorForRoute(props.route_id);
  if (selectedRouteId && props.route_id === selectedRouteId) {
    return { color: baseColor, weight: 6, opacity: 1 };
  }
  if (matchingRoute) {
    const exactMatchSegment = (props.from_port === stop.port_name && props.from_day_key === stop.day_key) ||
                              (props.to_port === stop.port_name && props.to_day_key === stop.day_key);
    return exactMatchSegment
      ? { color: baseColor, weight: 4.5, opacity: 0.95 }
      : { color: baseColor, weight: 2.8, opacity: 0.72 };
  }
  return { color: '#c6ccd8', weight: 2, opacity: 0.35 };
}

function pointStyle(props, stop) {
  if (props.ship === ANCHOR_SHIP) {
    const selected = samePortDay(props, stop);
    return { radius: selected ? 9 : 7, weight: 2, color: '#ffffff', fillColor: '#153b8a', fillOpacity: 1 };
  }
  const matchingRoute = matchesStopByRoute(props.route_id, stop);
  const baseColor = colorForRoute(props.route_id);
  if (selectedRouteId && props.route_id === selectedRouteId) {
    return { radius: samePortDay(props, stop) ? 8.5 : 6.5, weight: 2, color: '#ffffff', fillColor: baseColor, fillOpacity: 1 };
  }
  if (matchingRoute) {
    const selected = samePortDay(props, stop);
    return selected
      ? { radius: 8, weight: 2, color: '#ffffff', fillColor: baseColor, fillOpacity: 1 }
      : { radius: 5.5, weight: 1, color: '#ffffff', fillColor: baseColor, fillOpacity: 0.9 };
  }
  return { radius: 4.5, weight: 1, color: '#ffffff', fillColor: '#c6ccd8', fillOpacity: 0.7 };
}

function portPopupHtml(p, stop) {
  const relationship = p.ship === ANCHOR_SHIP
    ? 'Anchor ship'
    : (samePortDay(p, stop) ? 'In port with Beyond at this stop' : 'Other stop on matching route');
  const linkHtml = p.itinerary_link ? `<div class="popup-row"><a href="${escapeHtml(p.itinerary_link)}" target="_blank" rel="noopener noreferrer">Open booking / itinerary link</a></div>` : '';
  return `
    <div class="popup-title">${escapeHtml(p.route_id)}</div>
    <div class="popup-row"><strong>Ship:</strong> ${escapeHtml(p.ship)}</div>
    <div class="popup-row"><strong>Cruise line:</strong> ${escapeHtml(p.cruise_line)}</div>
    <div class="popup-row"><strong>Date:</strong> ${escapeHtml(p.display_date || p.day_key)}</div>
    <div class="popup-row"><strong>Port:</strong> ${escapeHtml(p.port_name)}</div>
    <div class="popup-row"><strong>Status:</strong> ${escapeHtml(relationship)}</div>
    <div class="popup-row"><strong>Also in port:</strong> ${escapeHtml(p.ships_at_port_same_day || '—')}</div>
    ${linkHtml}
  `;
}

function routePopupHtml(p, stop) {
  const relationship = p.ship === ANCHOR_SHIP
    ? 'Anchor ship route'
    : (matchesStopByRoute(p.route_id, stop) ? 'Matching route' : 'Non-matching route');
  const linkHtml = p.itinerary_link ? `<div class="popup-row"><a href="${escapeHtml(p.itinerary_link)}" target="_blank" rel="noopener noreferrer">Open booking / itinerary link</a></div>` : '';
  return `
    <div class="popup-title">${escapeHtml(p.route_id)}</div>
    <div class="popup-row"><strong>Ship:</strong> ${escapeHtml(p.ship)}</div>
    <div class="popup-row"><strong>Cruise line:</strong> ${escapeHtml(p.cruise_line)}</div>
    <div class="popup-row"><strong>Segment:</strong> ${escapeHtml(p.from_port)} → ${escapeHtml(p.to_port)}</div>
    <div class="popup-row"><strong>Dates:</strong> ${escapeHtml(p.from_display_date)} → ${escapeHtml(p.to_display_date)}</div>
    <div class="popup-row"><strong>Status:</strong> ${escapeHtml(relationship)}</div>
    ${linkHtml}
  `;
}

function renderMatchList(stop) {
  const routes = getMatchingRoutes(stop);
  selectedStopText.innerHTML = `<strong>${escapeHtml(stop.display_date)}</strong><br>${escapeHtml(stop.port_name)}`;
  matchList.innerHTML = '';
  if (!routes.length) {
    matchList.innerHTML = '<div class="small">No other ships in port with Beyond at this stop.</div>';
    return;
  }
  routes.forEach(item => {
    const div = document.createElement('div');
    div.className = 'match-item';
    const color = colorForRoute(item.route_id);
    const linkHtml = item.itinerary_link
      ? `<div class="match-link"><a href="${escapeHtml(item.itinerary_link)}" target="_blank" rel="noopener noreferrer">Booking / itinerary link</a></div>`
      : '';
    div.innerHTML = `
      <div class="match-title" style="color:${color};">${escapeHtml(item.route_id)}</div>
      <div class="match-meta">${escapeHtml(item.ship)} · ${escapeHtml(item.cruise_line)}</div>
      ${linkHtml}
    `;
    div.addEventListener('click', (e) => {
      if (e.target.tagName.toLowerCase() !== 'a') {
        selectedRouteId = (selectedRouteId === item.route_id) ? null : item.route_id;
        render();
        zoomToRoute(item.route_id);
        openRoutePopup(item.route_id);
      }
    });
    matchList.appendChild(div);
  });
}

function zoomToRoute(routeId) {
  const layers = [];
  if (portsLayer) {
    portsLayer.eachLayer(layer => {
      const p = layer.feature.properties;
      if (p.route_id === routeId || p.ship === ANCHOR_SHIP) layers.push(layer);
    });
  }
  if (routesLayer) {
    routesLayer.eachLayer(layer => {
      const p = layer.feature.properties;
      if (p.route_id === routeId || p.ship === ANCHOR_SHIP) layers.push(layer);
    });
  }
  if (layers.length) {
    const fg = L.featureGroup(layers);
    map.fitBounds(fg.getBounds().pad(0.2));
  }
}

function openRoutePopup(routeId) {
  if (!routesLayer) return;
  let target = null;
  routesLayer.eachLayer(layer => {
    const p = layer.feature.properties;
    if (p.route_id === routeId && !target) target = layer;
  });
  if (target) target.openPopup();
}

function render() {
  const stop = selectedAnchorStop();
  renderMatchList(stop);

  if (routesLayer) map.removeLayer(routesLayer);
  if (portsLayer) map.removeLayer(portsLayer);

  routesLayer = L.geoJSON(routesData, {
    filter: feature => routeVisible(feature.properties, stop),
    style: feature => routeStyle(feature.properties, stop),
    onEachFeature: (feature, layer) => {
      layer.bindPopup(routePopupHtml(feature.properties, stop));
      layer.on('click', () => {
        if (feature.properties.ship !== ANCHOR_SHIP) {
          selectedRouteId = feature.properties.route_id;
          render();
          openRoutePopup(feature.properties.route_id);
        }
      });
    }
  }).addTo(map);

  portsLayer = L.geoJSON(portsData, {
    filter: feature => portVisible(feature.properties, stop),
    pointToLayer: (feature, latlng) => L.circleMarker(latlng, pointStyle(feature.properties, stop)),
    onEachFeature: (feature, layer) => {
      layer.bindPopup(portPopupHtml(feature.properties, stop));
      layer.on('click', () => {
        if (feature.properties.ship !== ANCHOR_SHIP) {
          selectedRouteId = feature.properties.route_id;
          render();
        }
      });
    }
  }).addTo(map);

  const visiblePorts = portsLayer.getLayers().length;
  const visibleRoutes = routesLayer.getLayers().length;
  const matches = getMatchingRoutes(stop).length;
  stats.innerHTML = `<strong>${matches}</strong> matching routes at selected Beyond stop<br><strong>${visiblePorts}</strong> visible ports<br><strong>${visibleRoutes}</strong> visible route segments`;

  const group = L.featureGroup([routesLayer, portsLayer]);
  if (group.getLayers().length) map.fitBounds(group.getBounds().pad(0.12));
}

function populateAnchorStops() {
  anchorStops.forEach((stop, idx) => {
    const opt = document.createElement('option');
    opt.value = idx;
    opt.textContent = `${stop.display_date} — ${stop.port_name}`;
    anchorStopFilter.appendChild(opt);
  });
}

Promise.all([
  fetch('./ports.geojson').then(r => r.json()),
  fetch('./routes.geojson').then(r => r.json())
]).then(([ports, routes]) => {
  portsData = ports;
  routesData = routes;
  populateAnchorStops();
  render();

  anchorStopFilter.addEventListener('change', () => {
    selectedRouteId = null;
    render();
  });
  showFullRoutes.addEventListener('change', () => {
    selectedRouteId = null;
    render();
  });
  showNonMatching.addEventListener('change', () => {
    selectedRouteId = null;
    render();
  });
  resetBtn.addEventListener('click', () => {
    anchorStopFilter.value = '0';
    showFullRoutes.checked = true;
    showNonMatching.checked = false;
    selectedRouteId = null;
    render();
  });
}).catch(err => {
  console.error(err);
  stats.textContent = 'Could not load ports.geojson or routes.geojson. Keep all three files in the same folder.';
});
</script>
</body>
</html>
