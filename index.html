<!DOCTYPE html>
<html>
<head>
    <title>Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // Set up the map
        var map = L.map('map').setView([20, 0], 2);

        // Use OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Example data for ships (replace this with your actual data)
        const ships = [
            { name: 'Carnival Cruise Line - Ship A', coordinates: [[10, 10], [20, 20]], color: '#e57373' },
            { name: 'Royal Caribbean - Ship B', coordinates: [[15, 5], [25, 15]], color: '#64b5f6' },
            // Add more ships with unique colors from a color palette
        ];

        // Function to add ship routes to the map
        ships.forEach(ship => {
            const route = L.polyline(ship.coordinates, { color: ship.color }).addTo(map);
            route.bindPopup(ship.name.replace(/(\w+) (\w+)/, '$1 | $2'));
        });

        // Add port markers based on ship data
        ships.forEach(ship => {
            ship.coordinates.forEach(coord => {
                L.marker(coord, { color: ship.color }).addTo(map)
                    .bindPopup(ship.name.replace(/(\w+) (\w+)/, '$1 | $2'));
            });
        });
    </script>
</body>
</html>
