<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Index Page</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #35424a;
            color: #ffffff;
            padding: 20px;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }
        .main {
            padding: 20px;
            background: white;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        footer {
            background: #35424a;
            color: #ffffff;
            text-align: center;
            padding: 10px;
            position: relative;
            bottom: 0;
            width: 100%;
        }
        @media (max-width: 600px) {
            .container {
                width: 95%;
            }
            header, footer {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Our Site</h1>
    </header>
    <div class="container">
        <div class="main">
            <h2>Improved User Experience</h2>
            <p>Explore our new features and enhancements designed for better usability.</p>
            <button onclick="alert('Thanks for clicking!')" style="padding: 10px 15px; background-color: #35424a; color: white; border: none; border-radius: 5px; cursor: pointer; transition: background 0.3s;">
                Click Me!
            </button>
        </div>
    </div>
    <footer>
        <p>&copy; 2026 Your Company. All rights reserved.</p>
    </footer>
</body>
</html>
