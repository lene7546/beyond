<!DOCTYPE html>
<html>
<head>
    <title>Cruise Routes</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-curve/src/leaflet.curve.js"></script>
</head>
<body>
    <div id="map" style="width: 100%; height: 600px;"></div>
    <script>
        var map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Sample coordinates for cruise route
        var ports = [
            [35.6762, 139.6503], // Tokyo
            [34.0522, -118.2437], // Los Angeles
            [51.5074, -0.1278], // London
            [48.8566, 2.3522] // Paris
        ];

        function drawCurvedPath(ports) {
            for (let i = 0; i < ports.length - 1; i++) {
                let start = ports[i];
                let end = ports[i + 1];
                let midPoint = [
                    (start[0] + end[0]) / 2,
                    (start[1] + end[1]) / 2
                ];

                // Calculate control point for quadratic bezier curve
                let controlPoint = [
                    midPoint[0] + (end[0] - start[0]) * 0.15,
                    midPoint[1] + (end[1] - start[1]) * 0.15
                ];

                L.curve(['M', start, 'Q', controlPoint, end], {
                    color: 'blue',
                    opacity: 0.7,
                    dashArray: '5, 10'
                }).addTo(map);
            }
        }

        drawCurvedPath(ports);
    </script>
</body>
</html>
