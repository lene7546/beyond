<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map with Enhancements</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #121212; /* Dark mode background */
            color: #ffffff; /* Dark mode text color */
        }
        /* Improved map tile styling */
        #map {
            width: 100%;
            height: 600px;
            transition: all 0.3s ease; /* Smooth transitions */
        }
        .legend {
            position: absolute;
            background: rgba(255,255,255,0.8);
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            transition: opacity 0.3s;
        }
        /* Improved route lines styling */
        .route-line {
            stroke: #ff0000;
            stroke-width: 3;
            transition: stroke-width 0.3s;
        }
        /* Improved port markers */
        .port-marker {
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.7);
            transition: transform 0.3s;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="legend">
        <h3>Legend</h3>
        <p>Red lines represent routes.</p>
        <p>Markers represent ports.</p>
    </div>
    <script>
        // Map initialization with better map tiles from CartoDB
        var map = L.map('map').setView([latitude, longitude], zoom);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Enhanced routing and markers (to be implemented)
        // Add route lines and port markers with improved styles
    </script>
</body>
</html>
